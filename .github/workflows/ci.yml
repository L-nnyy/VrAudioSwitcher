name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      - name: Publish single-file (smoke)
        # No --no-restore here: publishing with an explicit RID needs its own
        # RID-specific restore, which the earlier RID-less restore did not produce.
        run: >
          dotnet publish VrAudioSwitcher/VrAudioSwitcher.csproj
          -c Release -r win-x64 --self-contained false
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: VrAudioSwitcher-portable
          path: publish/VrAudioSwitcher.exe
          if-no-files-found: error
